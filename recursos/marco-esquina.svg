<!--
  ══════════════════════════════════════════════════════════════════════
  PIEZA DEL MARCO · ESQUINA (se usa en las 4 esquinas)
  ══════════════════════════════════════════════════════════════════════
  Mide 160 × 160 px y está dibujada para la esquina SUPERIOR IZQUIERDA.
  Las otras tres se obtienen reflejándola con CSS:
      superior derecha   → transform: scaleX(-1)
      inferior izquierda → transform: scaleY(-1)
      inferior derecha   → transform: scale(-1, -1)

  LA CLAVE: DÓNDE VA CADA MOTIVO
  Los azulejos rectos arrancan en el píxel 160. Para que la unión sea
  invisible, cada motivo de esta pieza tiene que caer justo donde caería
  si el azulejo siguiera hacia atrás:
      perlas       cada 24 → 76, 100, 124, 148
      dentículos   cada 24 → 70, 94, 118, 142
      guilloché    cada 24 → cruces en 64, 88, 112, 136, 160
      ovas         cada 30 → 85, 115, 145
      dardos       cada 30 → 72, 102, 132
      soga         cada  8 → 73, 81, 89 … 153

  En el cuadrado 0-72 × 0-72 va el clavo ornamental: el bloque tallado
  que remata la esquina y que le da el peso victoriano al conjunto.
-->
<svg xmlns="http://www.w3.org/2000/svg" width="160" height="160" viewBox="0 0 160 160">
  <defs>
    <!-- Horizontales (para la banda de arriba) -->
    <linearGradient id="hConvexoOro" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4a3818"/><stop offset="28%" stop-color="#c9a84c"/>
      <stop offset="48%" stop-color="#e6d090"/><stop offset="70%" stop-color="#a8862f"/>
      <stop offset="100%" stop-color="#3a2c12"/>
    </linearGradient>
    <linearGradient id="hProfundo" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#241a0e"/><stop offset="35%" stop-color="#6b5122"/>
      <stop offset="55%" stop-color="#8a6a2c"/><stop offset="100%" stop-color="#150e07"/>
    </linearGradient>
    <linearGradient id="hConcavo" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0605"/><stop offset="30%" stop-color="#241a0e"/>
      <stop offset="62%" stop-color="#171009"/><stop offset="100%" stop-color="#080504"/>
    </linearGradient>
    <linearGradient id="hFilete" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5a4520"/><stop offset="45%" stop-color="#e6d090"/>
      <stop offset="100%" stop-color="#5a4520"/>
    </linearGradient>

    <!-- Verticales (para la banda de la izquierda) -->
    <linearGradient id="vConvexoOro" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#4a3818"/><stop offset="28%" stop-color="#c9a84c"/>
      <stop offset="48%" stop-color="#e6d090"/><stop offset="70%" stop-color="#a8862f"/>
      <stop offset="100%" stop-color="#3a2c12"/>
    </linearGradient>
    <linearGradient id="vProfundo" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#241a0e"/><stop offset="35%" stop-color="#6b5122"/>
      <stop offset="55%" stop-color="#8a6a2c"/><stop offset="100%" stop-color="#150e07"/>
    </linearGradient>
    <linearGradient id="vConcavo" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0a0605"/><stop offset="30%" stop-color="#241a0e"/>
      <stop offset="62%" stop-color="#171009"/><stop offset="100%" stop-color="#080504"/>
    </linearGradient>
    <linearGradient id="vFilete" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#5a4520"/><stop offset="45%" stop-color="#e6d090"/>
      <stop offset="100%" stop-color="#5a4520"/>
    </linearGradient>

    <radialGradient id="perlaVolumen" cx="34%" cy="30%" r="72%">
      <stop offset="0%" stop-color="#ecd89a"/><stop offset="42%" stop-color="#c9a84c"/>
      <stop offset="100%" stop-color="#4a3818"/>
    </radialGradient>
    <radialGradient id="ovaVolumen" cx="32%" cy="26%" r="76%">
      <stop offset="0%" stop-color="#e6d090"/><stop offset="46%" stop-color="#b5983f"/>
      <stop offset="100%" stop-color="#3f2f14"/>
    </radialGradient>
    <linearGradient id="oroTallado" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ecd89a"/><stop offset="32%" stop-color="#c8a955"/>
      <stop offset="62%" stop-color="#8a6a2c"/><stop offset="100%" stop-color="#4a3818"/>
    </linearGradient>
    <radialGradient id="rubiCorner" cx="36%" cy="30%" r="72%">
      <stop offset="0%" stop-color="#e0697c"/><stop offset="35%" stop-color="#a81f36"/>
      <stop offset="100%" stop-color="#3a0810"/>
    </radialGradient>
    <radialGradient id="panelHundido" cx="42%" cy="34%" r="76%">
      <stop offset="0%" stop-color="#2e2011"/><stop offset="60%" stop-color="#14100a"/>
      <stop offset="100%" stop-color="#070504"/>
    </radialGradient>

    <filter id="sombraTalla" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="1.5" dy="2" stdDeviation="2" flood-color="#000" flood-opacity=".75"/>
    </filter>
  </defs>

  <!-- ⚠️ FONDO EN FORMA DE "L", NO UN CUADRADO.
       Antes acá había un rectángulo de 160 × 160 que pintaba de negro
       TODA la pieza, incluida la parte de adentro de la esquina, donde no
       hay ninguna moldura. Eso dejaba un cuadrado negro tapando el fondo
       de la página justo en las cuatro esquinas.

       Ahora se pintan solo las dos bandas que sí llevan moldura (la de
       arriba y la de la izquierda), y el hueco interior queda
       transparente para que se vea el fondo. -->
  <rect x="0" y="0" width="160" height="72" fill="#090604"/>
  <rect x="0" y="0" width="72"  height="160" fill="#090604"/>

  <!-- ════════ BANDA HORIZONTAL (continúa hacia la derecha) ════════ -->
  <g>
    <rect x="0" y="0" width="160" height="4" fill="url(#hProfundo)"/>
    <rect x="0" y="0"   width="160" height=".7" fill="#d9c079" opacity=".55"/>
    <rect x="0" y="3.3" width="160" height=".7" fill="#000"    opacity=".6"/>

    <rect x="0" y="4" width="160" height="10" fill="url(#hConcavo)"/>
    <g fill="#000" opacity=".45">
      <ellipse cx="77.4"  cy="10.4" rx="4" ry="3.6"/>
      <ellipse cx="101.4" cy="10.4" rx="4" ry="3.6"/>
      <ellipse cx="125.4" cy="10.4" rx="4" ry="3.6"/>
      <ellipse cx="149.4" cy="10.4" rx="4" ry="3.6"/>
    </g>
    <g fill="url(#perlaVolumen)">
      <ellipse cx="76"  cy="9" rx="4.6" ry="4.1"/>
      <ellipse cx="100" cy="9" rx="4.6" ry="4.1"/>
      <ellipse cx="124" cy="9" rx="4.6" ry="4.1"/>
      <ellipse cx="148" cy="9" rx="4.6" ry="4.1"/>
    </g>
    <g fill="url(#hProfundo)">
      <rect x="86.4"  y="6.2" width="3.2" height="5.6" rx="1.6"/>
      <rect x="110.4" y="6.2" width="3.2" height="5.6" rx="1.6"/>
      <rect x="134.4" y="6.2" width="3.2" height="5.6" rx="1.6"/>
      <rect x="158.4" y="6.2" width="3.2" height="5.6" rx="1.6"/>
    </g>

    <rect x="0" y="14" width="160" height="4" fill="url(#hProfundo)"/>
    <g stroke="#e6d090" stroke-width="1.5" stroke-linecap="round" opacity=".72">
      <path d="M73 14.4  L77 17.6"/>  <path d="M81 14.4  L85 17.6"/>
      <path d="M89 14.4  L93 17.6"/>  <path d="M97 14.4  L101 17.6"/>
      <path d="M105 14.4 L109 17.6"/> <path d="M113 14.4 L117 17.6"/>
      <path d="M121 14.4 L125 17.6"/> <path d="M129 14.4 L133 17.6"/>
      <path d="M137 14.4 L141 17.6"/> <path d="M145 14.4 L149 17.6"/>
