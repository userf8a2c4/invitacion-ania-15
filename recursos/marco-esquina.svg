  </g>

  <!-- ════════ CLAVO ORNAMENTAL DE LA ESQUINA (0-72 × 0-72) ════════ -->
  <g>
    <!-- Panel hundido con su sombra interior -->
    <rect x="0" y="0" width="72" height="72" fill="url(#panelHundido)"/>
    <rect x="0" y="0" width="72" height="72" fill="none"
          stroke="#000" stroke-width="6" opacity=".45"/>

    <!-- Molduras cuadradas concéntricas, cada una con su luz y su sombra -->
    <g fill="none">
      <rect x="2.5" y="2.5" width="67" height="67" stroke="url(#oroTallado)" stroke-width="2.6"/>
      <rect x="1.6" y="1.6" width="67" height="67" stroke="#ecd89a" stroke-width=".7" opacity=".45"/>
      <rect x="3.4" y="3.4" width="67" height="67" stroke="#000" stroke-width=".8" opacity=".55"/>

      <rect x="9"  y="9"  width="54" height="54" stroke="#6b5122" stroke-width="1.2" opacity=".85"/>
      <rect x="14" y="14" width="44" height="44" stroke="url(#oroTallado)" stroke-width="2" opacity=".95"/>
      <rect x="13.2" y="13.2" width="44" height="44" stroke="#ecd89a" stroke-width=".6" opacity=".4"/>
    </g>

    <!-- Soga retorcida bordeando el panel interior -->
    <g stroke="#c9a84c" stroke-width="1.3" stroke-linecap="round" opacity=".55">
      <path d="M17 11 L21 14"/>  <path d="M25 11 L29 14"/>  <path d="M33 11 L37 14"/>
      <path d="M41 11 L45 14"/>  <path d="M49 11 L53 14"/>
      <path d="M11 17 L14 21"/>  <path d="M11 25 L14 29"/>  <path d="M11 33 L14 37"/>
      <path d="M11 41 L14 45"/>  <path d="M11 49 L14 53"/>
    </g>

    <!-- Roleos de acanto en las diagonales, con relieve -->
    <g filter="url(#sombraTalla)">
      <g fill="none" stroke="url(#oroTallado)" stroke-width="2.2" stroke-linecap="round">
        <path d="M14 14 C 27 16,35 24,37 37 C 31 31,23 25,14 23"/>
        <path d="M58 14 C 45 16,37 24,35 37 C 41 31,49 25,58 23"/>
        <path d="M14 58 C 16 45,24 37,37 35 C 31 41,25 49,23 58"/>
        <path d="M58 58 C 56 45,48 37,35 35 C 41 41,47 49,49 58"/>
      </g>
    </g>

    <!-- Rosetón tallado del centro -->
    <g filter="url(#sombraTalla)">
      <circle cx="36" cy="36" r="16" fill="url(#panelHundido)"/>
      <circle cx="36" cy="36" r="16" fill="none" stroke="url(#oroTallado)" stroke-width="2.2"/>
      <circle cx="36" cy="36" r="15.2" fill="none" stroke="#ecd89a" stroke-width=".6" opacity=".4"/>
      <circle cx="36" cy="36" r="11.5" fill="none" stroke="#6b5122" stroke-width="1" opacity=".8"/>
      <g fill="url(#ovaVolumen)" transform="translate(36 36)">
        <path d="M0 -11.5 C 3 -6,3 -2,0 1 C -3 -2,-3 -6,0 -11.5 Z"/>
        <path d="M0 11.5 C 3 6,3 2,0 -1 C -3 2,-3 6,0 11.5 Z"/>
        <path d="M-11.5 0 C -6 3,-2 3,1 0 C -2 -3,-6 -3,-11.5 0 Z"/>
