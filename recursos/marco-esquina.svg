    <g fill="none" stroke="#000" stroke-width="3" opacity=".45">
      <path d="M65 30 C71 39,83 39,89 30 C95 21,107 21,113 30 C119 39,131 39,137 30 C143 21,155 21,161 30"/>
      <path d="M65 30 C71 21,83 21,89 30 C95 39,107 39,113 30 C119 21,131 21,137 30 C143 39,155 39,161 30"/>
    </g>
    <path d="M64 29 C70 38,82 38,88 29 C94 20,106 20,112 29 C118 38,130 38,136 29 C142 20,154 20,160 29"
          fill="none" stroke="url(#hFilete)" stroke-width="2.4" opacity=".92"/>
    <path d="M64 29 C70 20,82 20,88 29 C94 38,106 38,112 29 C118 20,130 20,136 29 C142 38,154 38,160 29"
          fill="none" stroke="url(#hFilete)" stroke-width="2.4" opacity=".92"/>
    <g fill="url(#perlaVolumen)">
      <circle cx="88"  cy="29" r="2.2"/><circle cx="112" cy="29" r="2.2"/>
      <circle cx="136" cy="29" r="2.2"/><circle cx="160" cy="29" r="2.2"/>
    </g>

    <rect x="0" y="40" width="160" height="8" fill="#0c0805"/>
    <g fill="#000" opacity=".6">
      <rect x="71.4"  y="41.6" width="12" height="7"/>
      <rect x="95.4"  y="41.6" width="12" height="7"/>
      <rect x="119.4" y="41.6" width="12" height="7"/>
      <rect x="143.4" y="41.6" width="12" height="7"/>
    </g>
    <g fill="url(#hConvexoOro)">
      <rect x="70"  y="40.3" width="12" height="7.4"/>
      <rect x="94"  y="40.3" width="12" height="7.4"/>
      <rect x="118" y="40.3" width="12" height="7.4"/>
      <rect x="142" y="40.3" width="12" height="7.4"/>
    </g>
    <g fill="#ecd89a" opacity=".5">
      <rect x="70"  y="40.3" width="12" height="1.2"/>
      <rect x="94"  y="40.3" width="12" height="1.2"/>
      <rect x="118" y="40.3" width="12" height="1.2"/>
      <rect x="142" y="40.3" width="12" height="1.2"/>
    </g>

    <rect x="0" y="48" width="160" height="4" fill="url(#hFilete)" opacity=".85"/>
    <rect x="0" y="51.4" width="160" height=".6" fill="#000" opacity=".5"/>

    <rect x="0" y="52" width="160" height="14" fill="url(#hConcavo)"/>
    <g fill="none" stroke="url(#hFilete)" stroke-width="1.5" opacity=".85">
      <path d="M85 53.6 C 78 53.6,74.6 55.8,74.6 59 C 74.6 62.2,78 64.4,85 64.4
               C 91 64.4,95 62.2,95 59 C 95 55.8,91 53.6,85 53.6 Z"/>
      <path d="M115 53.6 C 108 53.6,104.6 55.8,104.6 59 C 104.6 62.2,108 64.4,115 64.4
               C 121 64.4,125 62.2,125 59 C 125 55.8,121 53.6,115 53.6 Z"/>
      <path d="M145 53.6 C 138 53.6,134.6 55.8,134.6 59 C 134.6 62.2,138 64.4,145 64.4
               C 151 64.4,155 62.2,155 59 C 155 55.8,151 53.6,145 53.6 Z"/>
    </g>
    <g fill="#000" opacity=".5">
      <ellipse cx="86.2"  cy="60.2" rx="7.4" ry="3.6"/>
      <ellipse cx="116.2" cy="60.2" rx="7.4" ry="3.6"/>
      <ellipse cx="146.2" cy="60.2" rx="7.4" ry="3.6"/>
    </g>
    <g fill="url(#ovaVolumen)">
      <ellipse cx="85"  cy="59" rx="7.6" ry="3.7"/>
      <ellipse cx="115" cy="59" rx="7.6" ry="3.7"/>
      <ellipse cx="145" cy="59" rx="7.6" ry="3.7"/>
    </g>
    <g fill="url(#hConvexoOro)">
      <path d="M66 59 L71 61.4 L78 59 L71 56.6 Z"/>
      <path d="M96 59 L101 61.4 L108 59 L101 56.6 Z"/>
      <path d="M126 59 L131 61.4 L138 59 L131 56.6 Z"/>
      <path d="M156 59 L161 61.4 L168 59 L161 56.6 Z"/>
    </g>

    <rect x="0" y="66" width="160" height="6" fill="url(#hProfundo)"/>
    <rect x="0" y="66"   width="160" height=".8" fill="#000"    opacity=".55"/>
    <rect x="0" y="70.6" width="160" height=".8" fill="#d9c079" opacity=".5"/>
  </g>

  <!-- ════════ BANDA VERTICAL (continúa hacia abajo) ════════ -->
  <g>
    <rect x="0" y="0" width="4" height="160" fill="url(#vProfundo)"/>
    <rect x="0"   y="0" width=".7" height="160" fill="#d9c079" opacity=".55"/>
    <rect x="3.3" y="0" width=".7" height="160" fill="#000"    opacity=".6"/>

    <rect x="4" y="0" width="10" height="160" fill="url(#vConcavo)"/>
    <g fill="#000" opacity=".45">
      <ellipse cx="10.4" cy="77.4"  rx="3.6" ry="4"/>
      <ellipse cx="10.4" cy="101.4" rx="3.6" ry="4"/>
      <ellipse cx="10.4" cy="125.4" rx="3.6" ry="4"/>
      <ellipse cx="10.4" cy="149.4" rx="3.6" ry="4"/>
    </g>
    <g fill="url(#perlaVolumen)">
      <ellipse cx="9" cy="76"  rx="4.1" ry="4.6"/>
      <ellipse cx="9" cy="100" rx="4.1" ry="4.6"/>
      <ellipse cx="9" cy="124" rx="4.1" ry="4.6"/>
      <ellipse cx="9" cy="148" rx="4.1" ry="4.6"/>
    </g>
    <g fill="url(#vProfundo)">
      <rect x="6.2" y="86.4"  width="5.6" height="3.2" rx="1.6"/>
      <rect x="6.2" y="110.4" width="5.6" height="3.2" rx="1.6"/>
      <rect x="6.2" y="134.4" width="5.6" height="3.2" rx="1.6"/>
      <rect x="6.2" y="158.4" width="5.6" height="3.2" rx="1.6"/>
    </g>

    <rect x="14" y="0" width="4" height="160" fill="url(#vProfundo)"/>
    <g stroke="#e6d090" stroke-width="1.5" stroke-linecap="round" opacity=".72">
      <path d="M14.4 73  L17.6 77"/>  <path d="M14.4 81  L17.6 85"/>
      <path d="M14.4 89  L17.6 93"/>  <path d="M14.4 97  L17.6 101"/>
      <path d="M14.4 105 L17.6 109"/> <path d="M14.4 113 L17.6 117"/>
      <path d="M14.4 121 L17.6 125"/> <path d="M14.4 129 L17.6 133"/>
      <path d="M14.4 137 L17.6 141"/> <path d="M14.4 145 L17.6 149"/>
      <path d="M14.4 153 L17.6 157"/>
    </g>

    <rect x="18" y="0" width="22" height="160" fill="url(#vConcavo)"/>
    <g fill="none" stroke="#000" stroke-width="3" opacity=".45">
      <path d="M30 65 C39 71,39 83,30 89 C21 95,21 107,30 113 C39 119,39 131,30 137 C21 143,21 155,30 161"/>
      <path d="M30 65 C21 71,21 83,30 89 C39 95,39 107,30 113 C21 119,21 131,30 137 C39 143,39 155,30 161"/>
    </g>
    <path d="M29 64 C38 70,38 82,29 88 C20 94,20 106,29 112 C38 118,38 130,29 136 C20 142,20 154,29 160"
          fill="none" stroke="url(#vFilete)" stroke-width="2.4" opacity=".92"/>
    <path d="M29 64 C20 70,20 82,29 88 C38 94,38 106,29 112 C20 118,20 130,29 136 C38 142,38 154,29 160"
          fill="none" stroke="url(#vFilete)" stroke-width="2.4" opacity=".92"/>
    <g fill="url(#perlaVolumen)">
      <circle cx="29" cy="88"  r="2.2"/><circle cx="29" cy="112" r="2.2"/>
      <circle cx="29" cy="136" r="2.2"/><circle cx="29" cy="160" r="2.2"/>
    </g>

    <rect x="40" y="0" width="8" height="160" fill="#0c0805"/>
    <g fill="#000" opacity=".6">
      <rect x="41.6" y="71.4"  width="7" height="12"/>
      <rect x="41.6" y="95.4"  width="7" height="12"/>
      <rect x="41.6" y="119.4" width="7" height="12"/>
      <rect x="41.6" y="143.4" width="7" height="12"/>
    </g>
    <g fill="url(#vConvexoOro)">
      <rect x="40.3" y="70"  width="7.4" height="12"/>
      <rect x="40.3" y="94"  width="7.4" height="12"/>
      <rect x="40.3" y="118" width="7.4" height="12"/>
      <rect x="40.3" y="142" width="7.4" height="12"/>
    </g>
    <g fill="#ecd89a" opacity=".5">
      <rect x="40.3" y="70"  width="1.2" height="12"/>
      <rect x="40.3" y="94"  width="1.2" height="12"/>
      <rect x="40.3" y="118" width="1.2" height="12"/>
      <rect x="40.3" y="142" width="1.2" height="12"/>
    </g>

    <rect x="48" y="0" width="4" height="160" fill="url(#vFilete)" opacity=".85"/>
    <rect x="51.4" y="0" width=".6" height="160" fill="#000" opacity=".5"/>

    <rect x="52" y="0" width="14" height="160" fill="url(#vConcavo)"/>
    <g fill="none" stroke="url(#vFilete)" stroke-width="1.5" opacity=".85">
      <path d="M53.6 85 C 53.6 78,55.8 74.6,59 74.6 C 62.2 74.6,64.4 78,64.4 85
               C 64.4 91,62.2 95,59 95 C 55.8 95,53.6 91,53.6 85 Z"/>
      <path d="M53.6 115 C 53.6 108,55.8 104.6,59 104.6 C 62.2 104.6,64.4 108,64.4 115
               C 64.4 121,62.2 125,59 125 C 55.8 125,53.6 121,53.6 115 Z"/>
      <path d="M53.6 145 C 53.6 138,55.8 134.6,59 134.6 C 62.2 134.6,64.4 138,64.4 145
               C 64.4 151,62.2 155,59 155 C 55.8 155,53.6 151,53.6 145 Z"/>
    </g>
    <g fill="#000" opacity=".5">
      <ellipse cx="60.2" cy="86.2"  rx="3.6" ry="7.4"/>
      <ellipse cx="60.2" cy="116.2" rx="3.6" ry="7.4"/>
      <ellipse cx="60.2" cy="146.2" rx="3.6" ry="7.4"/>
    </g>
    <g fill="url(#ovaVolumen)">
      <ellipse cx="59" cy="85"  rx="3.7" ry="7.6"/>
      <ellipse cx="59" cy="115" rx="3.7" ry="7.6"/>
      <ellipse cx="59" cy="145" rx="3.7" ry="7.6"/>
