<!--
  PÉTALO DE ROSA · variante 2 (pétalo enrollado, visto de canto)
  Más estrecho y con el borde superior vuelto hacia atrás: es el que da
  sensación de volumen cuando cae girando.
-->
<svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 40 40">
  <defs>
    <linearGradient id="carne2" x1="0" y1="0" x2="1" y2="0.4">
      <stop offset="0%"   stop-color="#5c1220"/>
      <stop offset="30%"  stop-color="#a02538"/>
      <stop offset="62%"  stop-color="#71162a"/>
      <stop offset="100%" stop-color="#360a12"/>
    </linearGradient>
    <linearGradient id="vuelta2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#e8909d" stop-opacity=".55"/>
      <stop offset="100%" stop-color="#e8909d" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- cuerpo curvado -->
  <path d="M21 39 C 11 33, 5 21, 8 11 C 10 4, 17 2, 21 8 C 25 3, 32 5, 34 13 C 36 24, 30 34, 21 39 Z"
        fill="url(#carne2)"/>
  <!-- borde superior vuelto (la "solapa" que se enrolla) -->
  <path d="M8 11 C 10 4, 17 2, 21 8 C 25 3, 32 5, 34 13 C 30 9, 25 8, 21 12 C 17 8, 12 8, 8 11 Z"
        fill="url(#vuelta2)"/>
  <!-- sombra interior de la curvatura -->
  <path d="M21 12 C 19 20, 19 30, 21 38 C 17 31, 15 21, 17 13 Z"
        fill="#2c070e" fill-opacity=".45"/>
  <!-- nervaduras -->
  <g fill="none" stroke="#3d0b14" stroke-opacity=".45" stroke-linecap="round">
    <path d="M21 37 C 21 27, 21 18, 21 11" stroke-width="1"/>
    <path d="M21 31 C 17 26, 13 20, 11 15" stroke-width=".6"/>
    <path d="M21 31 C 25 26, 29 21, 31 16" stroke-width=".6"/>
  </g>
  <path d="M8 11 C 10 4, 17 2, 21 8 C 25 3, 32 5, 34 13"
        fill="none" stroke="#f0a9b4" stroke-width=".8" stroke-opacity=".4"/>
</svg>
