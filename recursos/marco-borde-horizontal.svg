<!--
  ══════════════════════════════════════════════════════════════════════
  PIEZA DEL MARCO · CENEFA HORIZONTAL (lados superior e inferior)
  ══════════════════════════════════════════════════════════════════════
  Es exactamente la misma moldura que el riel vertical, pero girada:
  azulejo de 120 × 72 px que se repite hacia los lados (repeat-x).

  Los ritmos vuelven a dividir exacto a 120 para que la unión no se note:
      perlas y dentículos  cada 24
      trenza del guilloché cada 24
      ovas y dardos        cada 30
      soga                 cada  8
      rosetón              cada 120

  DE AFUERA (y=0) HACIA ADENTRO (y=72):
      0-4   canto exterior
      4-14  astrágalo (hilera de perlas)
      14-18 soga retorcida
      18-40 campo con guilloché y rosetón
      40-48 dentículos
      48-52 filete
      52-66 ovas y dardos
      66-72 canto interior
-->
<svg xmlns="http://www.w3.org/2000/svg" width="120" height="72" viewBox="0 0 120 72">
  <defs>
    <!-- Degradados a lo alto: la luz entra desde afuera del marco -->
    <linearGradient id="convexoOro" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#4a3818"/>
      <stop offset="28%"  stop-color="#c9a84c"/>
      <stop offset="48%"  stop-color="#e6d090"/>
      <stop offset="70%"  stop-color="#a8862f"/>
      <stop offset="100%" stop-color="#3a2c12"/>
    </linearGradient>
    <linearGradient id="convexoProfundo" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#241a0e"/>
      <stop offset="35%"  stop-color="#6b5122"/>
      <stop offset="55%"  stop-color="#8a6a2c"/>
      <stop offset="100%" stop-color="#150e07"/>
    </linearGradient>
    <linearGradient id="concavo" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#0a0605"/>
      <stop offset="30%"  stop-color="#241a0e"/>
      <stop offset="62%"  stop-color="#171009"/>
      <stop offset="100%" stop-color="#080504"/>
    </linearGradient>
    <linearGradient id="fileteOro" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#5a4520"/>
      <stop offset="45%"  stop-color="#e6d090"/>
      <stop offset="100%" stop-color="#5a4520"/>
    </linearGradient>
    <radialGradient id="perlaVolumen" cx="34%" cy="30%" r="72%">
      <stop offset="0%"   stop-color="#ecd89a"/>
      <stop offset="42%"  stop-color="#c9a84c"/>
      <stop offset="100%" stop-color="#4a3818"/>
    </radialGradient>
    <radialGradient id="ovaVolumen" cx="32%" cy="26%" r="76%">
      <stop offset="0%"   stop-color="#e6d090"/>
      <stop offset="46%"  stop-color="#b5983f"/>
      <stop offset="100%" stop-color="#3f2f14"/>
    </radialGradient>
  </defs>

  <rect width="120" height="72" fill="#090604"/>

  <!-- ═══ CANTO EXTERIOR ═══ -->
  <rect x="0" y="0" width="120" height="4" fill="url(#convexoProfundo)"/>
  <rect x="0" y="0"   width="120" height=".7" fill="#d9c079" opacity=".55"/>
  <rect x="0" y="3.3" width="120" height=".7" fill="#000"    opacity=".6"/>

  <!-- ═══ ASTRÁGALO: PERLAS cada 24 ═══ -->
  <rect x="0" y="4" width="120" height="10" fill="url(#concavo)"/>
  <g fill="#000" opacity=".45">
    <ellipse cx="13.4"  cy="10.4" rx="4" ry="3.6"/>
    <ellipse cx="37.4"  cy="10.4" rx="4" ry="3.6"/>
    <ellipse cx="61.4"  cy="10.4" rx="4" ry="3.6"/>
    <ellipse cx="85.4"  cy="10.4" rx="4" ry="3.6"/>
    <ellipse cx="109.4" cy="10.4" rx="4" ry="3.6"/>
  </g>
  <g fill="url(#perlaVolumen)">
    <ellipse cx="12"  cy="9" rx="4.6" ry="4.1"/>
    <ellipse cx="36"  cy="9" rx="4.6" ry="4.1"/>
    <ellipse cx="60"  cy="9" rx="4.6" ry="4.1"/>
    <ellipse cx="84"  cy="9" rx="4.6" ry="4.1"/>
    <ellipse cx="108" cy="9" rx="4.6" ry="4.1"/>
  </g>
  <g fill="url(#convexoProfundo)">
    <rect x="22.4"  y="6.2" width="3.2" height="5.6" rx="1.6"/>
    <rect x="46.4"  y="6.2" width="3.2" height="5.6" rx="1.6"/>
    <rect x="70.4"  y="6.2" width="3.2" height="5.6" rx="1.6"/>
    <rect x="94.4"  y="6.2" width="3.2" height="5.6" rx="1.6"/>
    <rect x="-1.6"  y="6.2" width="3.2" height="5.6" rx="1.6"/>
    <rect x="118.4" y="6.2" width="3.2" height="5.6" rx="1.6"/>
  </g>

  <!-- ═══ SOGA RETORCIDA cada 8 ═══ -->
  <rect x="0" y="14" width="120" height="4" fill="url(#convexoProfundo)"/>
  <g stroke="#e6d090" stroke-width="1.5" stroke-linecap="round" opacity=".72">
    <path d="M1 14.4   L5 17.6"/>   <path d="M9 14.4   L13 17.6"/>
    <path d="M17 14.4  L21 17.6"/>  <path d="M25 14.4  L29 17.6"/>
    <path d="M33 14.4  L37 17.6"/>  <path d="M41 14.4  L45 17.6"/>
    <path d="M49 14.4  L53 17.6"/>  <path d="M57 14.4  L61 17.6"/>
    <path d="M65 14.4  L69 17.6"/>  <path d="M73 14.4  L77 17.6"/>
    <path d="M81 14.4  L85 17.6"/>  <path d="M89 14.4  L93 17.6"/>
    <path d="M97 14.4  L101 17.6"/> <path d="M105 14.4 L109 17.6"/>
    <path d="M113 14.4 L117 17.6"/>
  </g>
  <g stroke="#000" stroke-width="1.2" stroke-linecap="round" opacity=".5">
    <path d="M3.4 14.4   L7.4 17.6"/>   <path d="M11.4 14.4  L15.4 17.6"/>
    <path d="M19.4 14.4  L23.4 17.6"/>  <path d="M27.4 14.4  L31.4 17.6"/>
    <path d="M35.4 14.4  L39.4 17.6"/>  <path d="M43.4 14.4  L47.4 17.6"/>
    <path d="M51.4 14.4  L55.4 17.6"/>  <path d="M59.4 14.4  L63.4 17.6"/>
    <path d="M67.4 14.4  L71.4 17.6"/>  <path d="M75.4 14.4  L79.4 17.6"/>
    <path d="M83.4 14.4  L87.4 17.6"/>  <path d="M91.4 14.4  L95.4 17.6"/>
    <path d="M99.4 14.4  L103.4 17.6"/> <path d="M107.4 14.4 L111.4 17.6"/>
    <path d="M115.4 14.4 L119.4 17.6"/>
  </g>

  <!-- ═══ CAMPO CON GUILLOCHÉ cada 24 ═══ -->
  <rect x="0" y="18" width="120" height="22" fill="url(#concavo)"/>
  <g fill="none" stroke="#000" stroke-width="3" opacity=".45">
    <path d="M1 30 C7 39,19 39,25 30 C31 21,43 21,49 30 C55 39,67 39,73 30 C79 21,91 21,97 30 C103 39,115 39,121 30"/>
    <path d="M1 30 C7 21,19 21,25 30 C31 39,43 39,49 30 C55 21,67 21,73 30 C79 39,91 39,97 30 C103 21,115 21,121 30"/>
  </g>
  <path d="M0 29 C6 38,18 38,24 29 C30 20,42 20,48 29 C54 38,66 38,72 29 C78 20,90 20,96 29 C102 38,114 38,120 29"
        fill="none" stroke="url(#fileteOro)" stroke-width="2.4" opacity=".92"/>
  <path d="M0 29 C6 20,18 20,24 29 C30 38,42 38,48 29 C54 20,66 20,72 29 C78 38,90 38,96 29 C102 20,114 20,120 29"
        fill="none" stroke="url(#fileteOro)" stroke-width="2.4" opacity=".92"/>
  <g fill="url(#perlaVolumen)">
    <circle cx="0"   cy="29" r="2.2"/>
    <circle cx="24"  cy="29" r="2.2"/>
    <circle cx="48"  cy="29" r="2.2"/>
    <circle cx="72"  cy="29" r="2.2"/>
    <circle cx="96"  cy="29" r="2.2"/>
    <circle cx="120" cy="29" r="2.2"/>
  </g>

  <!-- Rosetón cada 120 -->
  <g transform="translate(60 29)">
    <ellipse cx="1.2" cy="1.4" rx="10" ry="10" fill="#000" opacity=".55"/>
    <circle r="10" fill="url(#convexoProfundo)"/>
    <circle r="10" fill="none" stroke="url(#fileteOro)" stroke-width="1.6"/>
    <g fill="url(#ovaVolumen)">
      <path d="M0 -7.8 C 2.2 -4,2.2 -1,0 1 C -2.2 -1,-2.2 -4,0 -7.8 Z"/>
      <path d="M0 7.8 C 2.2 4,2.2 1,0 -1 C -2.2 1,-2.2 4,0 7.8 Z"/>
      <path d="M-7.8 0 C -4 2.2,-1 2.2,1 0 C -1 -2.2,-4 -2.2,-7.8 0 Z"/>
      <path d="M7.8 0 C 4 2.2,1 2.2,-1 0 C 1 -2.2,4 -2.2,7.8 0 Z"/>
      <path d="M-5.5 -5.5 C -2.6 -3.6,-1 -2,-0.6 -0.6 C -2 -1,-3.6 -2.6,-5.5 -5.5 Z"/>
      <path d="M5.5 -5.5 C 2.6 -3.6,1 -2,0.6 -0.6 C 2 -1,3.6 -2.6,5.5 -5.5 Z"/>
      <path d="M-5.5 5.5 C -2.6 3.6,-1 2,-0.6 0.6 C -2 1,-3.6 2.6,-5.5 5.5 Z"/>
      <path d="M5.5 5.5 C 2.6 3.6,1 2,0.6 0.6 C 2 1,3.6 2.6,5.5 5.5 Z"/>
    </g>
    <circle r="2.6" fill="#8e1f30"/>
    <circle r="2.6" fill="none" stroke="#e6d090" stroke-width=".8" opacity=".8"/>
    <circle cx="-.8" cy="-.9" r=".9" fill="#ffd9df" opacity=".55"/>
  </g>

  <!-- ═══ DENTÍCULOS cada 24 ═══ -->
  <rect x="0" y="40" width="120" height="8" fill="#0c0805"/>
  <g fill="#000" opacity=".6">
    <rect x="7.4"   y="41.6" width="12" height="7"/>
    <rect x="31.4"  y="41.6" width="12" height="7"/>
    <rect x="55.4"  y="41.6" width="12" height="7"/>
    <rect x="79.4"  y="41.6" width="12" height="7"/>
    <rect x="103.4" y="41.6" width="12" height="7"/>
  </g>
  <g fill="url(#convexoOro)">
    <rect x="6"   y="40.3" width="12" height="7.4"/>
    <rect x="30"  y="40.3" width="12" height="7.4"/>
    <rect x="54"  y="40.3" width="12" height="7.4"/>
    <rect x="78"  y="40.3" width="12" height="7.4"/>
    <rect x="102" y="40.3" width="12" height="7.4"/>
  </g>
  <g fill="#ecd89a" opacity=".5">
    <rect x="6"   y="40.3" width="12" height="1.2"/>
    <rect x="30"  y="40.3" width="12" height="1.2"/>
    <rect x="54"  y="40.3" width="12" height="1.2"/>
    <rect x="78"  y="40.3" width="12" height="1.2"/>
    <rect x="102" y="40.3" width="12" height="1.2"/>
  </g>

  <!-- ═══ FILETE ═══ -->
  <rect x="0" y="48" width="120" height="4" fill="url(#fileteOro)" opacity=".85"/>
  <rect x="0" y="51.4" width="120" height=".6" fill="#000" opacity=".5"/>

  <!-- ═══ OVAS Y DARDOS cada 30 ═══ -->
  <rect x="0" y="52" width="120" height="14" fill="url(#concavo)"/>

  <g fill="none" stroke="url(#fileteOro)" stroke-width="1.5" opacity=".85">
    <path d="M15 53.6 C 8 53.6,4.6 55.8,4.6 59 C 4.6 62.2,8 64.4,15 64.4
             C 21 64.4,25 62.2,25 59 C 25 55.8,21 53.6,15 53.6 Z"/>
    <path d="M45 53.6 C 38 53.6,34.6 55.8,34.6 59 C 34.6 62.2,38 64.4,45 64.4
             C 51 64.4,55 62.2,55 59 C 55 55.8,51 53.6,45 53.6 Z"/>
    <path d="M75 53.6 C 68 53.6,64.6 55.8,64.6 59 C 64.6 62.2,68 64.4,75 64.4
             C 81 64.4,85 62.2,85 59 C 85 55.8,81 53.6,75 53.6 Z"/>
    <path d="M105 53.6 C 98 53.6,94.6 55.8,94.6 59 C 94.6 62.2,98 64.4,105 64.4
             C 111 64.4,115 62.2,115 59 C 115 55.8,111 53.6,105 53.6 Z"/>
  </g>
  <g fill="#000" opacity=".5">
    <ellipse cx="16.2"  cy="60.2" rx="7.4" ry="3.6"/>
    <ellipse cx="46.2"  cy="60.2" rx="7.4" ry="3.6"/>
    <ellipse cx="76.2"  cy="60.2" rx="7.4" ry="3.6"/>
    <ellipse cx="106.2" cy="60.2" rx="7.4" ry="3.6"/>
  </g>
  <g fill="url(#ovaVolumen)">
    <ellipse cx="15"  cy="59" rx="7.6" ry="3.7"/>
    <ellipse cx="45"  cy="59" rx="7.6" ry="3.7"/>
    <ellipse cx="75"  cy="59" rx="7.6" ry="3.7"/>
    <ellipse cx="105" cy="59" rx="7.6" ry="3.7"/>
  </g>
  <g fill="url(#convexoOro)">
    <path d="M-4 59 L1 61.4 L8 59 L1 56.6 Z"/>
    <path d="M26 59 L31 61.4 L38 59 L31 56.6 Z"/>
    <path d="M56 59 L61 61.4 L68 59 L61 56.6 Z"/>
    <path d="M86 59 L91 61.4 L98 59 L91 56.6 Z"/>
    <path d="M116 59 L121 61.4 L128 59 L121 56.6 Z"/>
  </g>

  <!-- ═══ CANTO INTERIOR ═══ -->
  <rect x="0" y="66" width="120" height="6" fill="url(#convexoProfundo)"/>
  <rect x="0" y="66"   width="120" height=".8" fill="#000"    opacity=".55"/>
  <rect x="0" y="70.6" width="120" height=".8" fill="#d9c079" opacity=".5"/>
</svg>
