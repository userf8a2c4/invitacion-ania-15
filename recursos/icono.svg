<!--
  ÍCONO DE LA PESTAÑA (favicon) · EL SELLO DE CERA
  Es el mismo lacre rojo que cierra el sobre de la invitación, con la "A"
  cursiva de Ania grabada encima. Se ve muy chico (16×16 px), así que:
    · la gota de cera es una forma llena, con volumen (luz arriba-izquierda,
      sombra abajo-derecha), para que se lea como cera y no como un círculo;
    · la "A" va en oro y con buen grosor, porque un grabado del mismo rojo
      que la cera desaparecería a ese tamaño. Es el único permiso que nos
      tomamos: en el sobre grande la A va hundida en la cera, acá va dorada
      para que sobreviva al tamaño de favicon.
-->
<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64">
  <defs>
    <!-- Cera: roja, con el brillo corrido arriba-izquierda (volumen) -->
    <radialGradient id="cera" cx="40%" cy="32%" r="74%">
      <stop offset="0%"   stop-color="#bd3149"/>
      <stop offset="42%"  stop-color="#8a1e30"/>
      <stop offset="78%"  stop-color="#54111f"/>
      <stop offset="100%" stop-color="#2c0812"/>
    </radialGradient>
    <linearGradient id="cera-a-oro" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#e8d290"/>
      <stop offset="50%"  stop-color="#c1a049"/>
      <stop offset="100%" stop-color="#8a6a2c"/>
    </linearGradient>
  </defs>

  <!-- La gota de cera: un círculo con el borde irregular, como cuando la
       cera cae y se aplasta con el cuño. -->
  <path d="M32 4 C 45 4,53 11,57 23 C 60 34,56 47,45 55 C 34 61,21 59,13 50
           C 5 41,5 29,10 19 C 14 10,22 5,32 4 Z" fill="url(#cera)"/>
  <!-- salpicaduras del lacre alrededor -->
  <g fill="#7a1728">
    <circle cx="55" cy="15" r="2.1"/>
    <circle cx="12" cy="47" r="1.7"/>
    <circle cx="50" cy="52" r="1.5"/>
  </g>

  <!-- Reborde levantado del cuño: un aro con luz arriba y sombra abajo -->
  <circle cx="32" cy="32" r="23" fill="none" stroke="#3a0c17" stroke-width="2" opacity=".55"/>
  <path d="M14 27 A 23 23 0 0 1 50 27" fill="none" stroke="#d9738a"
        stroke-width="1.4" stroke-opacity=".35" stroke-linecap="round"/>

  <!-- brillo especular de la cera pulida -->
  <ellipse cx="24" cy="21" rx="6" ry="3.4" fill="#f0aab6" opacity=".28"/>

  <!-- La "A" cursiva de un solo trazo (la misma firma que la pantalla de
       carga), grabada: primero su sombra hundida, después el trazo dorado. -->
  <g transform="translate(32 33) scale(0.34) translate(-49 -50)"
     fill="none" stroke-linecap="round" stroke-linejoin="round">
    <path d="M10 80 C 14 74,20 74,26 78 C 32 60,42 32,52 12
             C 62 34,73 62,88 88 C 79 75,66 64,42 64 C 34 64,29 68,26 74"
          stroke="#3a0c17" stroke-width="9" stroke-opacity=".7"
          transform="translate(1.5 2)"/>
    <path d="M10 80 C 14 74,20 74,26 78 C 32 60,42 32,52 12
             C 62 34,73 62,88 88 C 79 75,66 64,42 64 C 34 64,29 68,26 74"
          stroke="url(#cera-a-oro)" stroke-width="8"/>
  </g>
</svg>
